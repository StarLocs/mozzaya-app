<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>MoZZaya Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <style>
        :root { 
            --bg-fallback: #0d0e15; --card-bg: rgba(20, 20, 25, 0.75); --border: rgba(255, 255, 255, 0.15); 
            --text-main: #ffffff; --text-sub: #b0b3c6; --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            --accent: #bb86fc; --mint: #03dac6; 
        }
        body.theme-girl { --accent: #ff4785; --mint: #ff1493; }

        body { 
            background-color: var(--bg-fallback); background-size: cover; background-position: center;
            background-attachment: fixed; background-repeat: no-repeat; color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; transition: 0.4s;
            user-select: none; -webkit-user-select: none;
        }

        .app { width: 100%; max-width: 400px; padding: 20px 20px 30px 20px; box-sizing: border-box; display: flex; flex-direction: column; position: relative;}
        .screen { display: none; flex-direction: column; flex-grow: 1; }
        .screen.active { display: flex; animation: slideFade 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 28px; padding: 22px; margin-bottom: 15px; box-shadow: var(--card-shadow); }

        .edit-toggle { position: absolute; top: 25px; left: 25px; z-index: 10; width: 42px; height: 42px; border-radius: 14px; background: var(--card-bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; backdrop-filter: blur(10px); }

        .header-badge { background: var(--card-bg); border: 1px solid var(--border); border-radius: 35px; padding: 25px 15px; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; box-shadow: var(--card-shadow); }
        .profile-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 12px; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--mint)); display: flex; justify-content: center; align-items: center; font-size: 26px; font-weight: bold; color: #fff; box-shadow: 0 8px 25px rgba(0,0,0,0.6); background-size: cover; background-position: center; border: 3px solid var(--border); }
        .heart-icon { font-size: 30px; animation: heartbeat 1.2s infinite; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        #pair-names { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; text-align: center; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .menu-item { display: flex; justify-content: space-between; align-items: center; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 14px; padding: 22px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-1deg); } 75% { transform: rotate(1deg); } }
        .edit-mode .menu-item { animation: shake 0.3s infinite; border-style: dashed; border-color: var(--accent); }

        .btn { font-family: 'Montserrat', sans-serif; background: var(--accent); color: #fff; border: none; padding: 18px; border-radius: 20px; font-weight: 900; width: 100%; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        /* RADAR BLINK */
        .radar-container { position: relative; width: 160px; height: 160px; margin: 20px auto; border-radius: 50%; border: 1px solid var(--border); background: radial-gradient(circle, rgba(3, 218, 198, 0.05) 0%, transparent 70%); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .radar-sweep { position: absolute; width: 80px; height: 80px; top: 50%; left: 50%; background: conic-gradient(from 0deg, transparent 70%, var(--mint) 100%); transform-origin: 0 0; animation: sweep 3s linear infinite; opacity: 0.4; }
        @keyframes sweep { to { transform: rotate(360deg); } }
        .blink-pin { width: 50px; height: 50px; border-radius: 50%; border: 3px solid var(--mint); background-size: cover; background-position: center; z-index: 5; box-shadow: 0 0 20px var(--mint); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: #fff; }

        .loc-time-info { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; opacity: 0.7; }
        
        /* WISH */
        .wish-tabs { display: flex; background: rgba(0,0,0,0.5); border-radius: 20px; padding: 6px; margin-bottom: 20px; }
        .w-tab { flex: 1; text-align: center; padding: 14px; font-size: 11px; font-weight: 900; color: var(--text-sub); border-radius: 16px; cursor: pointer; font-family: 'Montserrat', sans-serif; text-transform: uppercase; }
        .w-tab.active { background: var(--accent); color: #fff; }
        .wish-item { display: flex; flex-direction: column; padding: 18px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 18px; margin-bottom: 12px; font-weight: 700; font-size: 14px; }
        .del-btn { color: #ff4757; font-size: 24px; font-weight: bold; background: rgba(255, 71, 87, 0.15); width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }

        input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 16px; padding: 18px; color: var(--text-main); margin: 5px 0 15px 0; box-sizing: border-box; outline: none; font-size: 15px; font-weight: 600; font-family: inherit;}
        label { font-size: 10px; color: var(--text-sub); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 5px; font-family: 'Montserrat', sans-serif;}
        .bg-thumb { width: 100%; height: 85px; border-radius: 16px; background-size: cover; background-position: center; border: 2px solid transparent; }
        .bg-thumb.active { border-color: var(--mint); }
        .bg-gallery { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>
    <div class="app">
        <div id="edit-btn" class="edit-toggle" onclick="toggleEdit()">✏️</div>

        <div id="home" class="screen active">
            <div class="header-badge">
                <div class="profile-row"><div id="my-ava" class="avatar">Я</div><span class="heart-icon">❤️</span><div id="p-ava" class="avatar">?</div></div>
                <h2 id="pair-names">Я ❤️ Половинка</h2>
            </div>
            <div id="sortable-menu">
                <div class="card menu-item" data-id="dmb" onclick="nav('dmb')"><span>🎖 Штаб службы</span> <span style="color:var(--accent)">→</span></div>
                <div class="card menu-item" data-id="wish" onclick="nav('wish')"><span>🎁 Корзина счастья</span> <span style="color:var(--accent)">→</span></div>
                <div class="card menu-item" data-id="locator" onclick="nav('locator')"><span>📍 Радар связи</span> <span style="color:var(--accent)">→</span></div>
                <div class="card menu-item" data-id="settings" onclick="nav('settings')"><span>⚙️ Настройки фона</span> <span style="color:var(--accent)">→</span></div>
            </div>
            <div class="sync-wrapper"><div class="btn-sync-small" onclick="syncAll()" style="background:var(--card-bg); border:1px solid var(--mint); color:var(--mint); padding:12px 26px; border-radius:30px; font-weight:900; cursor:pointer;">🔄 Синхронизировать</div></div>
        </div>

        <div id="locator" class="screen">
            <span onclick="nav('home')" style="cursor:pointer; color:var(--accent); font-weight:900; margin-bottom:20px; display:inline-block;">← НАЗАД</span>
            <div class="card" style="text-align:center;">
                <h3 style="margin:0; color:var(--mint); font-family:'Montserrat';">BLINK RADAR</h3>
                <div class="radar-container"><div class="radar-sweep"></div><div id="radar-pin" class="blink-pin">?</div></div>
                <p id="loc-status" style="font-size:12px; font-weight:900; margin: 15px 0; min-height:20px; color:var(--mint);"></p>
                <div id="p-last-time" class="loc-time-info" style="margin-bottom:20px;"></div>
                <button class="btn" id="btn-loc" onclick="sendLoc()" style="background:var(--mint); color:#000; margin-bottom:12px;">📍 Отправить геометку</button>
                <button class="btn" onclick="dist()" style="background:rgba(255,255,255,0.1); border:1px solid var(--accent); color:#fff; margin-bottom:12px;">📡 Скан дистанции</button>
                <button class="btn" onclick="viewP()" style="background:transparent; border:1px dashed var(--text-sub); color:var(--text-sub);">👀 Открыть карту</button>
            </div>
        </div>

        <div id="dmb" class="screen">
            <span onclick="nav('home')" style="cursor:pointer; color:var(--accent); font-weight:900; margin-bottom:20px; display:inline-block;">← НАЗАД</span>
            <div id="setup" class="card"><h3>УСТАНОВКА ДАТ</h3><label>ПРИЗЫВ</label><input type="date" id="ds"><label>ДЕМБЕЛЬ</label><input type="date" id="de"><button class="btn" onclick="saveDMB()">СОХРАНИТЬ</button></div>
            <div id="view" style="display:none;">
                <div class="card"><p style="text-align:center; font-size:10px; color:var(--text-sub); margin:0; font-weight:900;">ДО ДОМА ОСТАЛОСЬ</p>
                <div id="countdown"><span id="vd">0</span><small>д</small> <span id="vh">00</span><small>ч</small> <span id="vm">00</span><small>м</small> <span id="vs" class="neon">00</span></div>
                <div class="progress"><div id="bar"></div></div><div id="perc" style="text-align:center; font-size:12px; margin-top:8px; color:var(--mint); font-weight:bold;">0%</div></div>
                <div class="milestones"><div class="card" style="text-align:center; flex:1; margin-right:5px;"><small>ЭКВАТОР</small><b id="v-eq" style="display:block; font-size:22px;">0</b></div><div class="card" style="text-align:center; flex:1;"><small>ПРИКАЗ</small><b id="v-ord" style="display:block; font-size:22px;">0</b></div></div>
                <center><p style="font-size:11px; color:var(--text-sub); text-decoration:underline; cursor:pointer;" onclick="localStorage.removeItem('s'); localStorage.removeItem('e'); location.reload();">Сбросить даты</p></center>
            </div>
        </div>

        <div id="wish" class="screen">
            <span onclick="nav('home')" style="cursor:pointer; color:var(--accent); font-weight:900; margin-bottom:20px; display:inline-block;">← НАЗАД</span>
            <div class="wish-tabs"><div class="w-tab active" id="tab-partner" onclick="switchW('partner')">Хочет половинка</div><div class="w-tab" id="tab-me" onclick="switchW('me')">Мои желания</div></div>
            <div class="card"><div id="wish-input-group" style="display:none; gap:10px; margin-bottom:20px;"><input type="text" id="wi" placeholder="Что подарить?" style="margin:0;"><button class="btn" onclick="addW()" style="width:auto; padding:0 25px;">+</button></div><div id="wl"></div></div>
        </div>

        <div id="settings" class="screen">
            <span onclick="nav('home')" style="cursor:pointer; color:var(--accent); font-weight:900; margin-bottom:20px; display:inline-block;">← НАЗАД</span>
            <div class="card"><h3>🎨 ВЫБОР ФОНА</h3><div class="bg-gallery">
                <div class="bg-thumb" onclick="setBg('bg_1.jpg', this)" style="background-image:url('img/bg_1.jpg')"></div>
                <div class="bg-thumb" onclick="setBg('bg_2.jpg', this)" style="background-image:url('img/bg_2.jpg')"></div>
                <div class="bg-thumb" onclick="setBg('bg_3.jpg', this)" style="background-image:url('img/bg_3.jpg')"></div>
                <div class="bg-thumb" onclick="setBg('bg_4.jpg', this)" style="background-image:url('img/bg_4.jpg')"></div>
                <div class="bg-thumb" onclick="setBg('bg_boy_default.jpg', this)" style="background-image:url('img/bg_boy_default.jpg')"></div>
                <div class="bg-thumb" onclick="setBg('bg_girl_default.jpg', this)" style="background-image:url('img/bg_girl_default.jpg')"></div>
            </div><button class="btn" onclick="resetBg()" style="background:transparent; border:1px solid var(--text-sub); color:var(--text-sub); margin-top:20px; font-size:11px;">Сбросить</button></div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        const params = new URLSearchParams(window.location.search);
        
        if (params.get('reset') === '1') {
            let b = localStorage.getItem('custom_bg'), o = localStorage.getItem('menuOrder');
            localStorage.clear(); if(b) localStorage.setItem('custom_bg', b); if(o) localStorage.setItem('menuOrder', o);
        }

        ['role', 'pn', 'pp', 'plat', 'plon', 'pt', 's', 'e'].forEach(p => { if (params.has(p)) localStorage.setItem(p, params.get(p)); });
        
        let wishesData = { boy: [], girl: [] };
        try { let p = JSON.parse(decodeURIComponent(params.get('w') || '{}')); wishesData = Object.assign(wishesData, p); } catch(e) {}

        const role = localStorage.getItem('role') || 'boy';
        document.body.classList.toggle('theme-girl', role === 'girl');
        tg.headerColor = '#0d0e15';

        function applyBackground() { const b = localStorage.getItem('custom_bg'); document.body.style.backgroundImage = b ? `url('img/${b}')` : (role === 'girl' ? `url('img/bg_girl_default.jpg')` : `url('img/bg_boy_default.jpg')`); }
        applyBackground();
        function setBg(f, e) { localStorage.setItem('custom_bg', f); applyBackground(); document.querySelectorAll('.bg-thumb').forEach(t => t.classList.remove('active')); e.classList.add('active'); tg.HapticFeedback.impactOccurred('medium'); }
        function resetBg() { localStorage.removeItem('custom_bg'); applyBackground(); document.querySelectorAll('.bg-thumb').forEach(t => t.classList.remove('active')); }

        const myData = tg.initDataUnsafe?.user, myAva = document.getElementById('my-ava');
        if(myData?.photo_url) { myAva.style.backgroundImage = `url('${myData.photo_url}')`; myAva.innerText = ""; } else { myAva.innerText = 'Я'; }
        const pNick = localStorage.getItem('pn') || "Половинка", pPhoto = localStorage.getItem('pp'), pAva = document.getElementById('p-ava');
        if (pPhoto && pPhoto !== "" && pPhoto !== "None") { pAva.style.backgroundImage = `url('${pPhoto}')`; pAva.innerText = ""; } else { pAva.innerText = "❤️"; }
        document.getElementById('pair-names').innerText = `${myData?.first_name || 'Я'} ❤️ ${pNick}`;

        const menuContainer = document.getElementById('sortable-menu');
        let sortableInstance = null, isEditMode = false;
        function toggleEdit() {
            const btn = document.getElementById('edit-btn'); isEditMode = !isEditMode;
            if (isEditMode) {
                btn.innerText = "✅"; menuContainer.classList.add('edit-mode');
                sortableInstance = new Sortable(menuContainer, { animation: 250, onEnd: () => { const o = Array.from(menuContainer.children).map(el => el.getAttribute('data-id')); localStorage.setItem('menuOrder', JSON.stringify(o)); } });
                tg.HapticFeedback.impactOccurred('heavy');
            } else {
                btn.innerText = "✏️"; menuContainer.classList.remove('edit-mode'); if (sortableInstance) sortableInstance.destroy(); tg.HapticFeedback.notificationOccurred('success');
            }
        }
        const savedOrder = JSON.parse(localStorage.getItem('menuOrder'));
        if (savedOrder) savedOrder.forEach(id => { const el = menuContainer.querySelector(`[data-id="${id}"]`); if (el) menuContainer.appendChild(el); });

        function nav(id) { if (isEditMode) return; document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('edit-btn').style.display = (id === 'home') ? 'flex' : 'none'; if(id === 'locator') updateRadar(); if(id === 'dmb') checkDMB(); if(id === 'wish') renderW(); }

        function updateRadar() {
            const pt = parseInt(localStorage.getItem('pt'));
            const pin = document.getElementById('radar-pin');
            if(!pt) { document.getElementById('p-last-time').innerText = "Локацией еще не делились 💔"; pin.style.display = 'none'; return; }
            pin.style.display = 'flex';
            if (pPhoto && pPhoto !== "" && pPhoto !== "None") { pin.style.backgroundImage = `url('${pPhoto}')`; pin.innerText = ""; } else { pin.innerText = pNick[0].toUpperCase(); }
            const diff = Math.floor((Date.now() / 1000) - pt);
            document.getElementById('p-last-time').innerText = diff < 60 ? "Только что 📍" : `Обновлено: ${Math.floor(diff/60)} мин. назад`;
        }

        function sendLoc() {
            const btn = document.getElementById('btn-loc'); btn.disabled = true;
            navigator.geolocation.getCurrentPosition((pos) => {
                const data = {action: "checkin", lat: pos.coords.latitude, lon: pos.coords.longitude};
                try {
                    tg.sendData(JSON.stringify(data));
                    document.getElementById('loc-status').innerText = "✅ ОТПРАВЛЕНО БОТУ!";
                    setTimeout(() => tg.close(), 1200);
                } catch(e) {
                    // ЕСЛИ SENDDATA ЗАБЛОКИРОВАН (ЛЕВАЯ КНОПКА)
                    const url = `https://yandex.ru/maps/?pt=${pos.coords.longitude},${pos.coords.latitude}&z=16&l=map`;
                    tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent("Моя геолокация 📍")}`);
                    btn.disabled = false;
                }
            }, () => { btn.disabled = false; }, { enableHighAccuracy: true });
        }

        function dist() {
            const plat = parseFloat(localStorage.getItem('plat')), plon = parseFloat(localStorage.getItem('plon'));
            if(!plat) return tg.showAlert("Сначала половинка должна отправить метку!");
            navigator.geolocation.getCurrentPosition((pos) => {
                const R = 6371; 
                const dLat = (pos.coords.latitude - plat) * Math.PI / 180;
                const dLon = (pos.coords.longitude - plon) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(plat * Math.PI / 180) * Math.cos(pos.coords.latitude * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                document.getElementById('loc-status').innerText = `Дистанция: ${d < 1 ? Math.round(d*1000)+' м' : d.toFixed(1)+' км'} 💜`;
            });
        }
        function viewP() { const lat = localStorage.getItem('plat'), lon = localStorage.getItem('plon'); if(!lat) return; window.open(`https://yandex.ru/maps/?pt=${lon},${lat}&z=16&l=map`, '_blank'); }

        function checkDMB() { if(localStorage.getItem('s')) { document.getElementById('setup').style.display='none'; document.getElementById('view').style.display='block'; tick(); } else { document.getElementById('setup').style.display='block'; document.getElementById('view').style.display='none'; } }
        function saveDMB() { const s = document.getElementById('ds').value, e = document.getElementById('de').value; if(!s || !e) return; localStorage.setItem('s', s); localStorage.setItem('e', e); checkDMB(); }
        function tick() {
            const start = new Date(localStorage.getItem('s')).getTime(), end = new Date(localStorage.getItem('e')).getTime(), now = new Date().getTime(), left = end - now;
            if (now < start || now > end) return;
            const p = ((now - start) / (end - start)) * 100;
            document.getElementById('bar').style.width = p + '%'; document.getElementById('perc').innerText = p.toFixed(8) + '%';
            document.getElementById('vd').innerText = Math.floor(left / 86400000);
            document.getElementById('vh').innerText = Math.floor((left % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById('vm').innerText = Math.floor((left % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById('vs').innerText = Math.floor((left % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('v-eq').innerText = Math.max(0, Math.floor((start + (end-start)/2 - now)/86400000));
            document.getElementById('v-ord').innerText = Math.max(0, Math.floor((end - 100*86400000 - now)/86400000));
        }
        
        let currentWTab = 'partner';
        function switchW(t) { currentWTab = t; document.getElementById('tab-partner').classList.toggle('active', t === 'partner'); document.getElementById('tab-me').classList.toggle('active', t === 'me'); document.getElementById('wish-input-group').style.display = t === 'me' ? 'flex' : 'none'; renderW(); }
        function renderW() {
            const list = document.getElementById('wl'), pr = role === 'girl' ? 'boy' : 'girl', active = currentWTab === 'me' ? wishesData[role] : wishesData[pr];
            if (!active || active.length === 0) { list.innerHTML = `<p style="text-align:center; color:var(--text-sub); margin-top:30px; font-size:12px;">Пусто...</p>`; return; }
            list.innerHTML = active.map((w, i) => `<div class="wish-item"><div style="display:flex; justify-content:space-between; align-items:flex-start;"><span>${w.replace(/(https?:\/\/[^\s]+)/g, '<br><a href="$1" target="_blank" class="wish-link">🔗 ОТКРЫТЬ ССЫЛКУ</a>')}</span>${currentWTab === 'me' ? `<span class="del-btn" onclick="delW(${i})">×</span>` : ''}</div></div>`).join('');
        }
        function addW() { const i = document.getElementById('wi'); if(!i.value.trim()) return; if(!wishesData[role]) wishesData[role] = []; wishesData[role].push(i.value.trim()); i.value=''; localStorage.setItem('w', JSON.stringify(wishesData)); renderW(); }
        function delW(i) { wishesData[role].splice(i, 1); localStorage.setItem('w', JSON.stringify(wishesData)); renderW(); }
        
        function syncAll() { try { tg.sendData(JSON.stringify({ s: localStorage.getItem('s'), e: localStorage.getItem('e'), w: wishesData })); tg.HapticFeedback.notificationOccurred('success'); } catch(e) { tg.showAlert("Локальное сохранение! Для облачного используй главную кнопку бота."); } }
        setInterval(() => { if(localStorage.getItem('s')) tick(); }, 100);
    </script>
</body>
</html>
