<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoZZaya Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <div id="screen-home" class="screen active">
            <header>
                <h1>MoZZaya ✨</h1>
                <p class="subtitle">Ваше личное пространство</p>
            </header>
            <div class="glass-card menu-btn" onclick="showScreen('screen-dmb')">
                <span class="btn-text">🪖 Армейский Штаб</span>
                <span class="arrow">→</span>
            </div>
            <div class="glass-card menu-btn" onclick="showScreen('screen-wish')">
                <span class="btn-text">🎁 Корзина счастья</span>
                <span class="arrow">→</span>
            </div>
        </div>

        <div id="screen-dmb" class="screen">
            <button class="back-btn" onclick="showScreen('screen-home')">← Назад</button>
            
            <div id="dmb-settings" class="glass-card">
                <h3>Настройка службы</h3>
                <input type="date" id="dmb-start-input">
                <input type="date" id="dmb-end-input">
                <button class="primary-btn" onclick="saveDMB()">Начать отсчет</button>
            </div>

            <div id="dmb-display" style="display: none; width: 100%;">
                <div class="glass-card status-box">
                    <div class="status-top">
                        <span id="rank-text">ЗАПАХ</span>
                        <div class="live-dot"></div>
                    </div>
                    <div id="current-activity">Загрузка распорядка...</div>
                </div>

                <div class="glass-card">
                    <div id="countdown">
                        <span id="d-big">0</span><small>д</small>
                        <span id="h-big">00</span><small>ч</small>
                        <span id="m-big">00</span><small>м</small>
                        <span id="s-big" class="neon-s">00</span>
                    </div>
                    <div class="progress-wrap"><div id="bar-fill"></div></div>
                    <div id="perc-val">0.000000%</div>
                </div>

                <div class="stats-grid">
                    <div class="glass-card mini-card">
                        <small>ЭКВАТОР</small>
                        <span id="eq-val">0</span>
                    </div>
                    <div class="glass-card mini-card">
                        <small>ПРИКАЗ</small>
                        <span id="ord-val">0</span>
                    </div>
                </div>

                <button class="sync-btn" onclick="syncData()">💾 Синхронизировать</button>
                <p class="reset-link" onclick="resetDMB()">сбросить даты</p>
            </div>
        </div>

        <div id="screen-wish" class="screen">
            <button class="back-btn" onclick="showScreen('screen-home')">← Назад</button>
            <div class="glass-card">
                <h2>🎁 Корзина счастья</h2>
                <div class="wish-row">
                    <input type="text" id="wish-input" placeholder="Чего бы хотелось?">
                    <button class="add-btn" onclick="addWish()">+</button>
                </div>
                <div id="wish-list"></div>
            </div>
        </div>

    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
