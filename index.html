<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoZZaya Premium</title>
    <style>
        /* БАЗОВАЯ ТЕМА (ПАРЕНЬ - ТЕМНАЯ) */
        :root { 
            --bg: #0a0a0a; 
            --glass: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.1); 
            --accent: #bb86fc; 
            --mint: #03dac6; 
            --text-main: #ffffff;
            --text-sub: #777777;
            --input-bg: rgba(0,0,0,0.4);
            --card-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ТЕМА ДЛЯ ДЕВУШКИ (СВЕТЛАЯ/РОЗОВАТАЯ) */
        body.theme-girl {
            --bg: #fff0f5; 
            --glass: rgba(255, 255, 255, 0.6); 
            --border: rgba(255, 182, 193, 0.5); 
            --accent: #ff69b4; 
            --mint: #ff1493; 
            --text-main: #333333; 
            --text-sub: #888888;
            --input-bg: rgba(255, 255, 255, 0.8);
            --card-shadow: 0 10px 30px rgba(255, 182, 193, 0.3);
        }

        body { background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; transition: background 0.5s ease; }
        .app { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }
        .screen { display: none; flex-direction: column; }
        .screen.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; box-shadow: var(--card-shadow); }
        .btn { background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 16px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; font-size: 14px; letter-spacing: 1px; }
        
        /* КНОПКА СИНХРОНИЗАЦИИ НА ГЛАВНОМ ЭКРАНЕ */
        .btn-sync-main { 
            background: transparent; 
            border: 1px solid var(--mint); 
            color: var(--mint); 
            padding: 12px 20px; 
            border-radius: 20px; 
            font-weight: 800; 
            font-size: 12px; 
            cursor: pointer; 
            transition: 0.2s; 
            width: 100%;
            margin-top: 20px;
        }
        .btn-sync-main:active { background: var(--mint); color: #fff; }

        .menu-item { display: flex; justify-content: space-between; align-items: center; cursor: pointer; margin-bottom: 12px; font-weight: 700; }
        .menu-item:active { transform: scale(0.98); }
        input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; padding: 14px; color: var(--text-main); margin: 5px 0 15px 0; box-sizing: border-box; outline: none; font-size: 14px; }
        label { font-size: 10px; color: var(--text-sub); font-weight: 800; letter-spacing: 1px; }
        
        #countdown { font-size: 28px; font-weight: 900; text-align: center; margin: 15px 0; display: flex; justify-content: center; align-items: baseline; gap: 4px; }
        #countdown small { font-size: 12px; color: var(--text-sub); margin-right: 5px; }
        .neon { color: var(--mint); text-shadow: 0 0 10px var(--mint); width: 45px; display: inline-block; }
        
        .progress { height: 8px; background: rgba(128,128,128,0.2); border-radius: 10px; overflow: hidden; margin-top: 10px; }
        #bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--mint)); transition: 1s; }
        
        .wish-item { display: flex; justify-content: space-between; padding: 14px; background: rgba(128,128,128,0.05); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 8px; font-weight: 600; }
        .del-btn { color: #ff4b4b; cursor: pointer; font-weight: 900; padding-left: 10px; }
        .back-link { cursor: pointer; color: var(--accent); font-weight: 800; margin-bottom: 15px; display: inline-block; font-size: 14px; }
    </style>
</head>
<body>
    <div class="app">
        <div id="home" class="screen active">
            <h1 style="color:var(--accent); text-align:center; margin-bottom: 5px;">MoZZaya ✨</h1>
            <p style="text-align:center; color:var(--text-sub); font-size: 11px; letter-spacing: 2px; margin-bottom: 25px; font-weight:bold;">ВАШЕ ПРОСТРАНСТВО</p>
            
            <div class="card menu-item" onclick="nav('dmb')"><span>🎖 ШТАБ СЛУЖБЫ</span> <span style="color:var(--accent)">→</span></div>
            <div class="card menu-item" onclick="nav('wish')"><span>🎁 КОРЗИНА СЧАСТЬЯ</span> <span style="color:var(--accent)">→</span></div>
            
            <button class="btn-sync-main" onclick="syncAll()">🔄 СИНХРОНИЗИРОВАТЬ С ПАРТНЁРОМ</button>
        </div>

        <div id="dmb" class="screen">
            <span class="back-link" onclick="nav('home')">← НАЗАД</span>
            
            <div id="setup" class="card">
                <h3 style="margin-top:0;">УСТАНОВКА ПРИКАЗА</h3>
                <label>ПРИЗЫВ:</label>
                <input type="date" id="ds">
                <label>ДЕМБЕЛЬ:</label>
                <input type="date" id="de">
                <button class="btn" onclick="saveDMB()">НАЧАТЬ ОТСЧЕТ</button>
            </div>
            
            <div id="view" style="display:none;">
                <div class="card">
                    <p style="text-align:center; font-size:10px; color:var(--text-sub); margin:0; font-weight:bold; letter-spacing:1px;">ДО ДОМА ОСТАЛОСЬ:</p>
                    <div id="countdown">
                        <span id="vd">0</span><small>д</small> <span id="vh">00</span><small>ч</small> <span id="vm">00</span><small>м</small> <span id="vs" class="neon">00</span>
                    </div>
                    <div class="progress"><div id="bar"></div></div>
                    <div id="perc" style="text-align:center; font-size:12px; margin-top:8px; color:var(--mint); font-family: monospace; font-weight:bold;">0%</div>
                </div>
                <center><p style="font-size:10px; color:var(--text-sub); text-decoration:underline; cursor:pointer; margin-top:20px;" onclick="localStorage.removeItem('s'); localStorage.removeItem('e'); location.reload();">сбросить даты</p></center>
            </div>
        </div>

        <div id="wish" class="screen">
            <span class="back-link" onclick="nav('home')">← НАЗАД</span>
            <div class="card">
                <h3 style="margin-top:0;">🎁 Wishlist</h3>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <input type="text" id="wi" placeholder="Что подарить?" style="margin:0;">
                    <button class="btn" onclick="addW()" style="width:auto; padding:0 20px; margin:0; font-size:18px;">+</button>
                </div>
                <div id="wl" style="margin-bottom:15px;"></div>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        
        // ЧИТАЕМ ДАННЫЕ И ТЕМУ ИЗ ССЫЛКИ
        const params = new URLSearchParams(window.location.search);
        
        // Применяем тему
        const role = params.get('role');
        if (role === 'girl') {
            document.body.classList.add('theme-girl');
            tg.headerColor = '#fff0f5';
        } else {
            tg.headerColor = '#0a0a0a';
        }

        if(params.get('s')) localStorage.setItem('s', params.get('s'));
        if(params.get('e')) localStorage.setItem('e', params.get('e'));
        if(params.get('w')) {
            try { localStorage.setItem('w', decodeURIComponent(params.get('w'))); } catch(e) {}
        }

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'dmb') check();
            if(id === 'wish') render();
        }

        // --- ЛОГИКА ДМБ ---
        function check() {
            const s = localStorage.getItem('s');
            const e = localStorage.getItem('e');
            if(s && e) { document.getElementById('setup').style.display='none'; document.getElementById('view').style.display='block'; tick(); }
            else { document.getElementById('setup').style.display='block'; document.getElementById('view').style.display='none'; }
        }

        function saveDMB() {
            const s = document.getElementById('ds').value;
            const e = document.getElementById('de').value;
            if(!s || !e) return tg.showAlert("Выберите даты!");
            localStorage.setItem('s', s); localStorage.setItem('e', e);
            check();
            tg.showAlert("Даты сохранены на устройстве. Не забудьте нажать 'Синхронизировать' на главном экране!");
        }

        function tick() {
            const sStr = localStorage.getItem('s');
            const eStr = localStorage.getItem('e');
            if(!sStr || !eStr) return;
            
            const start = new Date(sStr).getTime();
            const end = new Date(eStr).getTime();
            const now = new Date().getTime();
            const left = end - now;
            
            if (now < start) { document.getElementById('perc').innerText = "Ждем призыва..."; return; }
            if (now > end) { document.getElementById('perc').innerText = "100% ДЕМБЕЛЬ!"; document.getElementById('bar').style.width = '100%'; return; }

            const p = ((now - start) / (end - start)) * 100;
            document.getElementById('bar').style.width = p + '%';
            document.getElementById('perc').innerText = p.toFixed(8) + '%';
            document.getElementById('vd').innerText = Math.floor(left / 86400000);
            document.getElementById('vh').innerText = Math.floor((left % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById('vm').innerText = Math.floor((left % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById('vs').innerText = Math.floor((left % 60000) / 1000).toString().padStart(2, '0');
        }

        // --- ЛОГИКА ЖЕЛАНИЙ ---
        let wishes = JSON.parse(localStorage.getItem('w') || '[]');
        function render() {
            document.getElementById('wl').innerHTML = wishes.length === 0 ? '<p style="text-align:center; color:var(--text-sub); font-size:12px;">Пусто...</p>' : 
            wishes.map((w, i) => `<div class="wish-item"><span>${w}</span><span class="del-btn" onclick="del(${i})">×</span></div>`).join('');
        }
        function addW() {
            const i = document.getElementById('wi'); if(!i.value.trim()) return;
            wishes.push(i.value.trim()); i.value=''; localStorage.setItem('w', JSON.stringify(wishes)); render();
        }
        function del(i) { wishes.splice(i, 1); localStorage.setItem('w', JSON.stringify(wishes)); render(); }

        // --- ГЛОБАЛЬНАЯ СИНХРОНИЗАЦИЯ ---
        function syncAll() {
            const s = localStorage.getItem('s') || "";
            const e = localStorage.getItem('e') || "";
            
            if (!s && !e && wishes.length === 0) {
                return tg.showAlert("Пока нечего синхронизировать. Настрой даты ДМБ или добавь желание!");
            }

            const data = { s: s, e: e, w: wishes };
            tg.sendData(JSON.stringify(data));
        }

        setInterval(() => { if(localStorage.getItem('s')) tick(); }, 50); 
    </script>
</body>
</html>
