<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoZZaya Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <div id="screen-home" class="screen active">
            <header>
                <h1>MoZZaya ✨</h1>
                <p class="subtitle">ВДВ: Никто, кроме нас</p>
            </header>

            <div class="glass-card menu-btn" onclick="showScreen('screen-dmb')">
                <div class="btn-content">
                    <span class="icon">🎖</span>
                    <span class="btn-text">ШТАБ СЛУЖБЫ</span>
                </div>
                <span class="arrow">→</span>
            </div>

            <div class="glass-card menu-btn" onclick="showScreen('screen-wish')">
                <div class="btn-content">
                    <span class="icon">🎁</span>
                    <span class="btn-text">КОРЗИНА СЧАСТЬЯ</span>
                </div>
                <span class="arrow">→</span>
            </div>
        </div>

        <div id="screen-dmb" class="screen">
            <button class="back-btn" onclick="showScreen('screen-home')">← НАЗАД</button>
            
            <div id="dmb-settings" class="glass-card">
                <h3>УСТАНОВКА ПРИКАЗА</h3>
                <label>Призыв:</label>
                <input type="date" id="dmb-start">
                <label>Дембель:</label>
                <input type="date" id="dmb-end">
                <button class="primary-btn" onclick="saveDMB()">ВСТАТЬ В СТРОЙ</button>
            </div>

            <div id="dmb-display" class="hidden-block">
                <div class="glass-card status-card">
                    <div class="status-row">
                        <span id="rank-name">РЯДОВОЙ</span>
                        <div class="live-indicator"><span>LIVE</span></div>
                    </div>
                    <span id="current-activity">Служба идет...</span>
                </div>

                <div class="glass-card timer-card">
                    <p class="timer-title">ДО ДОМА ОСТАЛОСЬ</p>
                    <div id="main-countdown">
                        <span id="val-d">0</span><small>д</small>
                        <span id="val-h">00</span><small>ч</small>
                        <span id="val-m">00</span><small>м</small>
                        <span id="val-s" class="neon">00</span>
                    </div>
                    <div class="progress-container"><div id="progress-fill"></div></div>
                    <div id="percent-display">0.000000%</div>
                </div>

                <div class="milestones-grid">
                    <div class="glass-card mini">
                        <small>ЭКВАТОР</small>
                        <span id="val-eq">--</span>
                        <p>дней</p>
                    </div>
                    <div class="glass-card mini">
                        <small>ПРИКАЗ</small>
                        <span id="val-ord">--</span>
                        <p>дней</p>
                    </div>
                </div>

                <button class="sync-btn" onclick="syncWithBot()">💾 СИНХРОНИЗИРОВАТЬ</button>
                <span class="reset-link" onclick="resetData()">сбросить данные</span>
            </div>
        </div>

        <div id="screen-wish" class="screen">
            <button class="back-btn" onclick="showScreen('screen-home')">← НАЗАД</button>
            <div class="glass-card">
                <h2>🎁 Wishlist</h2>
                <div class="input-row">
                    <input type="text" id="wish-in" placeholder="Твое желание...">
                    <button class="add-btn" onclick="addWish()">+</button>
                </div>
                <div id="wish-list-container"></div>
            </div>
        </div>

    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
