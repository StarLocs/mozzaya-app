<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoZZaya Premium</title>
    <style>
        :root { --bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --accent: #bb86fc; --mint: #03dac6; --text-main: #fff; --text-sub: #777; }
        body.theme-girl { --bg: #fff0f5; --glass: rgba(255, 255, 255, 0.6); --border: rgba(255, 182, 193, 0.5); --accent: #ff69b4; --mint: #ff1493; --text-main: #333; --text-sub: #888; }
        body { background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; transition: 0.5s; overflow-x: hidden; }
        .app { width: 100%; max-width: 400px; padding: 15px; box-sizing: border-box; }
        .screen { display: none; flex-direction: column; }
        .screen.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: 14px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 8px; }
        .btn-sync { background: transparent; border: 1px solid var(--mint); color: var(--mint); font-size: 11px; padding: 10px; margin-top: 15px; }

        .profile-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; background: #222; }
        .heart-icon { font-size: 20px; color: var(--accent); animation: beat 1.2s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        #countdown { font-size: 26px; font-weight: 900; text-align: center; margin: 10px 0; display: flex; justify-content: center; align-items: baseline; gap: 3px; }
        .neon { color: var(--mint); text-shadow: 0 0 8px var(--mint); width: 40px; display: inline-block; }
        .milestones { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .m-card { text-align: center; padding: 10px !important; }
        .m-card b { font-size: 20px; display: block; color: var(--accent); }

        input { width: 100%; background: rgba(0,0,0,0.1); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text-main); margin: 5px 0 10px 0; box-sizing: border-box; outline: none; }
        .wish-item { display: flex; justify-content: space-between; padding: 12px; background: rgba(128,128,128,0.05); border-radius: 12px; margin-bottom: 6px; }
    </style>
</head>
<body>
    <div class="app">
        <div id="home" class="screen active">
            <div class="profile-row">
                <img id="my-ava" class="avatar" src="">
                <span class="heart-icon">❤️</span>
                <img id="p-ava" class="avatar" src="">
            </div>
            <h2 id="pair-names" style="text-align:center; margin-top:0;">Мы</h2>
            
            <div class="card" onclick="nav('dmb')">🎖 ШТАБ СЛУЖБЫ <span style="float:right">→</span></div>
            <div class="card" onclick="nav('wish')">🎁 КОРЗИНА СЧАСТЬЯ <span style="float:right">→</span></div>
            <div class="card" onclick="nav('settings')">⚙️ НАСТРОЙКИ ПАРЫ <span style="float:right">→</span></div>
            
            <button class="btn btn-sync" onclick="syncAll()">🔄 СИНХРОНИЗИРОВАТЬ ВСЁ</button>
        </div>

        <div id="dmb" class="screen">
            <span onclick="nav('home')" style="cursor:pointer; color:var(--accent)">← НАЗАД</span>
            <div id="setup" class="card" style="margin-top:10px;">
                <h3>УСТАНОВКА ДАТ</h3>
                <input type="date" id="ds"><input type="date" id="de">
                <button class="btn" onclick="saveDMB()">СОХРАНИТЬ</button>
            </div>
            <div id="view" style="display:none; margin-top:10px;">
                <div class="card">
                    <p style="text-align:center; font-size:10px; color:var(--text-sub); margin:0;">ДО ДОМА:</p>
                    <div id="countdown">
                        <span id="vd">0</span>д <span id="vh">00</span>ч <span id="vm">00</span>м <span id="vs" class="neon">00</span>
                    </div>
                    <div style="height:6px; background:rgba(128,128,128,0.2); border-radius:10px; overflow:hidden;">
                        <div id="bar" style="height:100%; width:0%; background:var(--mint); transition:1s;"></div>
                    </div>
                    <div id="perc" style="text-align:center; font-size:11px; margin-top:5px; color:var(--mint); font-family:monospace;">0%</div>
                </div>
                <div class="milestones">
                    <div class="card m-card"><small>ЭКВАТОР</small><b id="v-eq">0</b>дней</div>
                    <div class="card m-card"><small>ПРИКАЗ</small><b id="v-ord">0</b>дней</div>
                </div>
            </div>
        </div>

        <div id="wish" class="screen">
            <span onclick="nav('home')" style="cursor:pointer; color:var(--accent)">← НАЗАД</span>
            <div class="card" style="margin-top:10px;">
                <h3>🎁 Wishlist</h3>
                <div style="display:flex; gap:8px;"><input type="text" id="wi" placeholder="Что подарить?"><button onclick="addW()" style="width:50px; height:45px; background:var(--accent); border:none; border-radius:12px;">+</button></div>
                <div id="wl"></div>
            </div>
        </div>

        <div id="settings" class="screen">
            <span onclick="nav('home')" style="cursor:pointer; color:var(--accent)">← НАЗАД</span>
            <div class="card" style="margin-top:10px;">
                <h3>ПЕРСОНАЛИЗАЦИЯ</h3>
                <label>КАК НАЗЫВАТЬ ПОЛОВИНКУ?</label>
                <input type="text" id="p-nick" placeholder="Напр: Заичка" oninput="updateNick()">
            </div>
            <button class="btn" style="background:#ff4b4b" onclick="breakRel()">💔 РАЗОРВАТЬ СВЯЗЬ</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        const params = new URLSearchParams(window.location.search);

        // 1. ПРОВЕРКА НА РАЗРЫВ (ОЧИСТКА)
        if (params.get('reset') === '1') {
            localStorage.clear();
        }

        // 2. ЗАГРУЗКА ДАННЫХ И ТЕМЫ
        if (params.get('role') === 'girl') document.body.classList.add('theme-girl');
        if (params.get('s')) localStorage.setItem('s', params.get('s'));
        if (params.get('e')) localStorage.setItem('e', params.get('e'));
        if (params.get('w')) localStorage.setItem('w', decodeURIComponent(params.get('w')));
        if (params.get('st')) localStorage.setItem('st', decodeURIComponent(params.get('st')));

        // 3. АВАТАРКИ И ИМЕНА
        const myData = tg.initDataUnsafe?.user;
        if(myData?.photo_url) document.getElementById('my-ava').src = myData.photo_url;
        if(params.get('pp')) document.getElementById('p-ava').src = decodeURIComponent(params.get('pp'));
        
        function updateNick() {
            const nick = document.getElementById('p-nick').value || params.get('pn') || "Половинка";
            document.getElementById('pair-names').innerText = `${myData?.first_name || 'Я'} ❤️ ${nick}`;
        }

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'dmb') checkDMB();
            if(id === 'wish') render();
            if(id === 'settings') {
                const st = JSON.parse(localStorage.getItem('st') || '{}');
                document.getElementById('p-nick').value = st.nick || "";
            }
            updateNick();
        }

        function checkDMB() {
            const s = localStorage.getItem('s');
            if(s) { document.getElementById('setup').style.display='none'; document.getElementById('view').style.display='block'; tick(); }
            else { document.getElementById('setup').style.display='block'; document.getElementById('view').style.display='none'; }
        }

        function saveDMB() {
            localStorage.setItem('s', document.getElementById('ds').value);
            localStorage.setItem('e', document.getElementById('de').value);
            checkDMB();
        }

        function tick() {
            const start = new Date(localStorage.getItem('s')).getTime();
            const end = new Date(localStorage.getItem('e')).getTime();
            const now = new Date().getTime();
            const left = end - now;
            const p = Math.min(100, ((now - start) / (end - start)) * 100);
            document.getElementById('bar').style.width = p + '%';
            document.getElementById('perc').innerText = p.toFixed(8) + '%';
            document.getElementById('vd').innerText = Math.floor(left / 86400000);
            document.getElementById('vh').innerText = Math.floor((left % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById('vm').innerText = Math.floor((left % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById('vs').innerText = Math.floor((left % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('v-eq').innerText = Math.max(0, Math.floor((start + (end-start)/2 - now)/86400000));
            document.getElementById('v-ord').innerText = Math.max(0, Math.floor((end - 100*86400000 - now)/86400000));
        }

        let wishes = JSON.parse(localStorage.getItem('w') || '[]');
        function render() {
            document.getElementById('wl').innerHTML = wishes.length === 0 ? '<p style="text-align:center; color:var(--text-sub);">Пусто...</p>' : 
            wishes.map((w, i) => `<div class="wish-item"><span>${w}</span><span class="del-btn" onclick="del(${i})">×</span></div>`).join('');
        }
        function addW() {
            const i = document.getElementById('wi'); if(!i.value) return;
            wishes.push(i.value.trim()); i.value=''; localStorage.setItem('w', JSON.stringify(wishes)); render();
        }
        function del(i) { wishes.splice(i, 1); localStorage.setItem('w', JSON.stringify(wishes)); render(); }

        function syncAll() {
            const st = JSON.parse(localStorage.getItem('st') || '{}');
            st.nick = document.getElementById('p-nick').value;
            const data = { s: localStorage.getItem('s'), e: localStorage.getItem('e'), w: wishes, st: st };
            tg.sendData(JSON.stringify(data));
        }

        function breakRel() {
            tg.showConfirm("Точно расстаемся?", (c) => {
                if(c) { localStorage.clear(); tg.sendData(JSON.stringify({action:"break_pair"})); }
            });
        }

        updateNick();
        setInterval(() => { if(localStorage.getItem('s')) tick(); }, 1000);
    </script>
</body>
</html>
