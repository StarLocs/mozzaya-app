<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoZZaya Locator</title>
    <style>
        :root { --bg: #05060f; --accent: #bb86fc; --mint: #03dac6; --glass: rgba(255, 255, 255, 0.05); }
        body.theme-girl { --bg: #fff0f5; --accent: #ff4785; --mint: #ff1493; --glass: rgba(255, 255, 255, 0.7); }
        
        body {
            background-color: var(--bg);
            background-image: url('img/bg_radar.jpg'); /* ТВОЙ НОВЫЙ ФОН */
            background-size: cover; background-position: center;
            color: #fff; font-family: -apple-system, sans-serif;
            margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        .container { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; height: 100%; }
        .back-btn { color: var(--accent); text-decoration: none; font-weight: 900; font-size: 14px; margin-bottom: 20px; display: inline-block; }

        /* КРАСИВАЯ ПЛАНЕТА */
        .planet-wrap { position: relative; width: 180px; height: 180px; margin: 30px auto; }
        .planet {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); /* Космический градиент */
            border-radius: 50%;
            box-shadow: inset -20px -20px 50px #000, 0 0 30px var(--mint);
            animation: pulse-planet 4s ease-in-out infinite;
            z-index: 2; position: relative;
        }
        @keyframes pulse-planet { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--mint); } 50% { transform: scale(1.05); box-shadow: 0 0 40px var(--mint); } }

        .radar-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid var(--mint); border-radius: 50%; opacity: 0; animation: radarPing 3s ease-out infinite; }
        .r1 { width: 220px; height: 220px; animation-delay: 0s; }
        .r2 { width: 300px; height: 300px; animation-delay: 1.5s; }
        @keyframes radarPing { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; } }

        .scan-line { position: absolute; width: 50%; height: 2px; background: linear-gradient(to right, transparent, var(--mint)); top: 50%; left: 50%; transform-origin: left center; animation: scan 3s linear infinite; z-index: 1; }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .info-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 28px; padding: 20px; margin-top: auto; border: 1px solid rgba(255,255,255,0.1); }
        .btn { border: none; padding: 16px; border-radius: 18px; font-weight: 900; width: 100%; font-size: 13px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-send { background: var(--mint); color: #000; }
        .btn-view { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--accent); }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← НАЗАД</a>

        <div class="planet-wrap">
            <div class="radar-ring r1"></div>
            <div class="radar-ring r2"></div>
            <div class="scan-line"></div>
            <div class="planet"></div>
        </div>

        <div class="info-card">
            <p id="status" style="text-align:center; font-size:11px; color:var(--accent); font-weight:bold; margin-bottom:15px; text-transform:uppercase;"></p>
            <button class="btn btn-send" id="btn-send" onclick="sendLoc()">📍 ОТПРАВИТЬ СВОЮ ГЕОПОЗИЦИЮ</button>
            <button class="btn btn-view" id="btn-view" onclick="viewPartner()">👀 ГДЕ МОЯ ПОЛОВИНКА?</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        const params = new URLSearchParams(window.location.search);
        if(params.get('role') === 'girl') document.body.classList.add('theme-girl');

        const plat = params.get('plat');
        const plon = params.get('plon');

        function sendLoc() {
            const btn = document.getElementById('btn-send');
            const status = document.getElementById('status');
            btn.disabled = true; status.innerText = "ПОИСК СПУТНИКОВ...";

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    tg.sendData(JSON.stringify({action: "checkin", lat: pos.coords.latitude, lon: pos.coords.longitude}));
                    status.innerText = "СИГНАЛ ОТПРАВЛЕН!";
                },
                () => { status.innerText = "ОШИБКА ГЕОПОЗИЦИИ!"; btn.disabled = false; },
                { enableHighAccuracy: true }
            );
        }

        function viewPartner() {
            if(!plat || !plon) {
                tg.showAlert("Твоя половинка еще не отправляла геометку! 💔");
            } else {
                window.open(`https://yandex.ru/maps/?pt=${plon},${plat}&z=16&l=map`, '_blank');
            }
        }
    </script>
</body>
</html>
