<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoZZaya Locator</title>
    <style>
        :root {
            --bg: #05060f;
            --accent: #bb86fc;
            --mint: #03dac6;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body.theme-girl {
            --bg: #fff0f5;
            --accent: #ff4785;
            --mint: #ff1493;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(187, 134, 252, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(3, 218, 198, 0.05) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            color: var(--accent);
            text-decoration: none;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* 3D ПЛАНЕТА */
        .planet-wrap {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 40px auto;
        }

        .planet {
            width: 100%;
            height: 100%;
            background: url('https://img.freepik.com/free-photo/stars-night-sky_155003-14562.jpg'); /* Текстура */
            background-size: 400px 200px;
            border-radius: 50%;
            box-shadow: 
                inset -20px -20px 50px #000,
                inset 10px 10px 30px rgba(255,255,255,0.2),
                0 0 40px var(--mint);
            animation: rotatePlanet 15s linear infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes rotatePlanet {
            from { background-position: 0 0; }
            to { background-position: 400px 0; }
        }

        /* РАДАР */
        .radar-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid var(--mint);
            border-radius: 50%;
            opacity: 0;
            animation: radarPing 3s ease-out infinite;
        }

        .r1 { width: 220px; height: 220px; animation-delay: 0s; }
        .r2 { width: 300px; height: 300px; animation-delay: 1s; }
        .r3 { width: 380px; height: 380px; animation-delay: 2s; }

        @keyframes radarPing {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
        }

        .scan-line {
            position: absolute;
            width: 50%;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--mint));
            top: 50%;
            left: 50%;
            transform-origin: left center;
            animation: scan 4s linear infinite;
            z-index: 1;
        }

        @keyframes scan {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .info-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            margin-top: auto;
        }

        .status-text {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-sub);
            margin-bottom: 15px;
            font-weight: 800;
        }

        .btn-checkin {
            background: linear-gradient(135deg, var(--accent), var(--mint));
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-weight: 900;
            width: 100%;
            font-size: 14px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-checkin:active { transform: scale(0.95); }
        .btn-checkin:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">← НАЗАД</a>
        </div>

        <div class="planet-wrap">
            <div class="radar-ring r1"></div>
            <div class="radar-ring r2"></div>
            <div class="radar-ring r3"></div>
            <div class="scan-line"></div>
            <div class="planet"></div>
        </div>

        <div class="info-card">
            <div class="status-text" id="status">Готов к поиску</div>
            <button class="btn-checkin" id="btn" onclick="sendLoc()">📍 ОТПРАВИТЬ ГЕОМЕТКУ</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        const params = new URLSearchParams(window.location.search);
        if(params.get('role') === 'girl') document.body.classList.add('theme-girl');

        function sendLoc() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            status.innerText = "УСТАНОВКА СВЯЗИ...";

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const data = {
                        action: "checkin",
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude
                    };
                    tg.sendData(JSON.stringify(data));
                    tg.HapticFeedback.notificationOccurred('success');
                    status.innerText = "СИГНАЛ ОТПРАВЛЕН!";
                },
                (err) => {
                    status.innerText = "ОШИБКА ДОСТУПА!";
                    btn.disabled = false;
                },
                { enableHighAccuracy: true }
            );
        }
    </script>
</body>
</html>
